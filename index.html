<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAPEOS - Monitor 24/7</title>

    <!-- PWA & SEO -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Monitoreo de pagos Yape en tiempo real 24/7">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Socket.io for Instant Speed -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=20260310v6">
</head>

<body>

    <div class="app-layout">
        <div class="glass-container">
            <header class="nutri-header">
                <div class="logo-group">
                    <div class="logo">YAPE<span>OS</span></div>
                </div>
                <!-- App Controls -->
                <div class="app-controls">
                    <button id="btn-theme" class="icon-btn" title="Cambiar Tema" onclick="toggleTheme()">☀️</button>
                    <button id="btn-notify" class="icon-btn" title="Notificaciones PUSH" onclick="requestPush()">🔔</button>
                    <div class="status-badge">
                        <span class="status-dot online"></span>
                        <span class="status-label" id="status-text">CONECTADO</span>
                    </div>
                </div>
            </header>

            <!-- Store Tabs (Carpeta) -->
            <div class="store-tabs">
                <button id="tab-all" class="store-tab active" onclick="switchStore('All')">Todos los Pagos</button>
                <button id="tab-benito" class="store-tab" onclick="switchStore('Benito')">📁 Tienda Benito</button>
            </div>

            <!-- Selector de Días (Horizontal Scroll) -->
            <div id="date-selector" class="date-selector">
                <!-- Los días se cargarán aquí dinámicamente -->
            </div>

            <div class="summary">
                <div class="card total">
                    <h3 id="total-label">Total Recibido</h3>
                    <p id="t-amount">S/ 0.00</p>
                </div>
                <div class="card">
                    <h3 id="count-label">Ventas Hoy</h3>
                    <p id="t-count">0</p>
                </div>
            </div>

            <div class="section-actions">
                <input type="text" id="search-bar" class="search-bar" placeholder="🔍 Buscar nombre o monto..." onkeyup="handleSearch()">
                <div class="section-header">
                    <h2 id="view-title">YAPEOS DEL DÍA</h2>
                </div>
            </div>

            <div id="notifications-list" class="notifications-list vertical">
                <!-- Las notificaciones aparecerán aquí -->
            </div>

            <button id="btn-start" class="btn-start" onclick="initSystem()">RECONECTAR</button>
            
            <button id="btn-export" class="btn-start btn-export" onclick="exportData()" style="display:block;">📄 Cierre de Caja (PDF)</button>
        </div>

        <div class="qr-column">
            <div class="qr-card">
                <h2>Paga con Yape</h2>
                <div class="qr-wrapper">
                    <img src="yape_qr.png" alt="QR de Yape" />
                </div>
                <p>Escanea el código para pagar</p>
            </div>
        </div>
    </div>

    <!-- Audio para notificaciones (Sonido de Yape) -->
    <audio id="yape-sound" src="https://www.myinstants.com/media/sounds/yape-notificacion.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="app.js?v=20260310v6"></script>
</body>

</html>
