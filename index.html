<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAPEOS - Monitor 24/7</title>

    <!-- PWA & SEO -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Monitoreo de pagos Yape en tiempo real 24/7">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=20260310v2">
</head>

<body>

    <div class="glass-container">
        <header class="nutri-header">
            <div class="logo-group">
                <div class="logo">YAPE<span>OS</span></div>
            </div>
            <div class="status-badge">
                <span class="status-dot online"></span>
                <span class="status-label">CONECTADO</span>
            </div>
        </header>

        <!-- Selector de Días (Horizontal Scroll) -->
        <div id="date-selector" class="date-selector">
            <!-- Los días se cargarán aquí dinámicamente -->
        </div>

        <div class="summary">
            <div class="card total">
                <h3 id="total-label">Total Recibido</h3>
                <p id="t-amount">S/ 0.00</p>
            </div>
            <div class="card">
                <h3 id="count-label">Ventas Hoy</h3>
                <p id="t-count">0</p>
            </div>
        </div>

        <div class="section-header">
            <h2 id="view-title">YAPEOS DEL DÍA</h2>
        </div>

        <div id="notifications-list" class="notifications-list vertical">
            <!-- Las notificaciones aparecerán aquí -->
        </div>

        <button id="btn-start" class="btn-start" onclick="initSystem()">RECONECTAR</button>
    </div>

    <!-- Audio para notificaciones (Sonido de Yape) -->
    <audio id="yape-sound" src="https://www.myinstants.com/media/sounds/yape-notificacion.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="app.js?v=20260310v2"></script>
</body>

</html>
