<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAPEOS - Monitor 24/7</title>

    <!-- PWA & SEO -->
    <meta name="color-scheme" content="light dark">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1120">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Monitoreo de pagos Yape en tiempo real 24/7">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Socket.io for Instant Speed -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=20260310v6">
</head>

<body>

    <div class="app-layout">
        <div class="glass-container">
            <header class="nutri-header">
                <div class="logo-group">
                    <div class="logo">YAPE<span>OS</span></div>
                </div>
                <!-- App Controls -->
                <div class="app-controls">
                    <button id="btn-settings" class="icon-btn" title="Configuración" onclick="openSettings()">⚙️</button>
                    <div class="status-badge">
                        <span class="status-dot online"></span>
                        <span class="status-label" id="status-text">CONECTADO</span>
                    </div>
                </div>
            </header>

            <!-- Store Tabs (Carpeta) -->
            <div class="store-tabs">
                <button id="tab-all" class="store-tab active" onclick="switchStore('All')">Todos los Pagos</button>
                <button id="tab-benito" class="store-tab" onclick="switchStore('Benito')">📁 Tienda Benito</button>
            </div>

            <!-- Selector de Días (Horizontal Scroll) -->
            <div id="date-selector" class="date-selector">
                <!-- Los días se cargarán aquí dinámicamente -->
            </div>

            <div class="summary">
                <div class="card total">
                    <h3 id="total-label">Total Recibido</h3>
                    <p id="t-amount">S/ 0.00</p>
                </div>
                <div class="card">
                    <h3 id="count-label">Ventas Hoy</h3>
                    <p id="t-count">0</p>
                </div>
            </div>

            <div class="section-actions">
                <input type="text" id="search-bar" class="search-bar" placeholder="🔍 Buscar nombre o monto..." onkeyup="handleSearch()">
                <div class="section-header">
                    <h2 id="view-title">YAPEOS DEL DÍA</h2>
                </div>
            </div>

            <div id="notifications-list" class="notifications-list vertical">
                <!-- Las notificaciones aparecerán aquí -->
            </div>

            <button id="btn-start" class="btn-start" onclick="initSystem()">RECONECTAR</button>
            <button id="btn-export" class="btn-start btn-export" onclick="exportData()" style="display:block;">📄 Cierre Diario (PDF)</button>
            
            <!-- Floating Banner for Multi Selection -->
            <div id="multi-select-banner" class="floating-banner" style="display:none;">
                <span id="select-count">0 seleccionados</span>
                <button onclick="markSelectedAsBenito()" class="btn-mark-store">🏷️ Marcar como Benito</button>
            </div>
        </div>

        <div class="qr-column">
            <div class="qr-card">
                <h2>Paga con Yape</h2>
                <div class="qr-wrapper">
                    <img src="yape_qr.png" alt="QR de Yape" />
                </div>
                <p>Escanea el código para pagar</p>
            </div>
        </div>
    </div>

    <!-- Modal de Configuración -->
    <div id="settings-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ Configuración</h2>
                <button class="icon-btn" onclick="closeSettings()">✕</button>
            </div>
            
            <div class="settings-group">
                <label>Tema de la Aplicación</label>
                <div class="toggle-row">
                    <span>Modo Claro / Oscuro</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="settings-group">
                <label>Notificaciones</label>
                <div class="toggle-row">
                    <span>Activar Notificaciones PUSH (Nativas)</span>
                    <button class="btn-action" onclick="requestPush()">Permitir 🔔</button>
                </div>
                <div class="toggle-row" style="margin-top:15px; flex-direction:column; align-items:flex-start;">
                    <span>Sonido de Alerta</span>
                    <select id="sound-select" onchange="changeSound()" class="search-bar" style="margin-top:10px;">
                        <option value="https://www.myinstants.com/media/sounds/yape-notificacion.mp3">Clásico Yape</option>
                        <option value="https://www.myinstants.com/media/sounds/ding-idea.mp3">Campanita (Tienda)</option>
                        <option value="https://www.myinstants.com/media/sounds/coin-drop-4.mp3">Moneda cayendo</option>
                    </select>
                </div>
            </div>
            
            <div class="settings-group">
                <p style="font-size:0.8rem; color:var(--text-secondary); text-align:center;">Cambios se guardan automáticamente</p>
            </div>
        </div>
    </div>

    <!-- Audio para notificaciones -->
    <audio id="yape-sound" src="https://www.myinstants.com/media/sounds/yape-notificacion.mp3" preload="auto"></audio>

    <!-- Scripts -->
    <script src="app.js?v=20260312v12"></script>
</body>
</html>
